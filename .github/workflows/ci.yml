name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    # Xcode 26 / iOS 26 SDK required (deployment target iOS 26).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v3

      - name: Install Swift tooling
        run: brew install swiftformat swiftlint

      - name: Check bootstrap status
        id: bootstrap
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Project not bootstrapped yet (no project.yml) — skipping lint/build/test so the docs-only scaffold stays green. See DESIGN.md milestone M0."
          fi

      - name: Install XcodeGen
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: brew install xcodegen

      - name: Bootstrap project
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: just bootstrap

      - name: Lint, build, test
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: just ci
