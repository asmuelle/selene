# swiftlint config — enforced by hooks and CI (skipped gracefully when absent).
excluded:
  - .build
  - DerivedData
  - Selene.xcodeproj

line_length:
  warning: 120
  error: 160

file_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 2
