# XcodeGen spec — Selene.xcodeproj is generated from this file and never committed.
name: Selene
options:
  bundleIdPrefix: app.selene
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  SelenePackages:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  Selene:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: SelenePackages
        products:
          - SeleneCore
          - CycleEngine
          - Persistence
          - InsightKit
          - ContentPack
          - Paywall
          - SeleneUI
          - DoctorVisit
          - VoiceCapture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.selene.Selene
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  SeleneAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - App/UITests
    dependencies:
      - target: Selene
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.selene.SeleneAppUITests
        GENERATE_INFOPLIST_FILE: "YES"

  # StoreKitTest-backed sandbox E2E for the StoreKit 2 adapter (M3). Lives
  # inside the Paywall boundary on purpose: this is the only test tree that
  # may import StoreKit (repo guards enforce it). Runs only via xcodebuild on
  # the simulator — `swift test` never needs an App Store or a simulator.
  PaywallStoreKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Packages/Paywall/StoreKitTests
      - path: App/Selene.storekit
        buildPhase: resources
    dependencies:
      - target: Selene
      - package: SelenePackages
        products:
          - Paywall
          - SeleneCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.selene.PaywallStoreKitTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Selene.app/Selene"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Selene:
    build:
      targets:
        Selene: all
        SeleneAppUITests: [test]
        PaywallStoreKitTests: [test]
    run:
      config: Debug
      storeKitConfiguration: App/Selene.storekit
    test:
      config: Debug
      storeKitConfiguration: App/Selene.storekit
      targets:
        - PaywallStoreKitTests
        - SeleneAppUITests
